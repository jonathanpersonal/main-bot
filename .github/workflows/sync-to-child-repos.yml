name: Sync Main Bot To Child Repos

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: "Release/version name, example: v0.1.0"
        required: true
        default: "manual-sync"

jobs:
  sync:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        child_repo:
          - jonathanpersonal/RWPD-Bot

    steps:
      - name: Checkout main-bot
        uses: actions/checkout@v4

      - name: Clone child repo
        run: |
          git clone https://x-access-token:${{ secrets.BOT_SYNC_TOKEN }}@github.com/${{ matrix.child_repo }} child-repo

      - name: Prepare sync branch
        run: |
          cd child-repo
          git config user.name "department-bot-sync"
          git config user.email "department-bot-sync@users.noreply.github.com"
          git checkout -b sync/${{ inputs.release_name }}-${{ github.run_number }}

      - name: Copy shared bot code
        run: |
          rsync -av --delete commands/ child-repo/commands/
          rsync -av --delete config/ child-repo/config/
          rsync -av --delete database/ child-repo/database/
          rsync -av --delete handlers/ child-repo/handlers/
          rsync -av --delete scripts/ child-repo/scripts/
          rsync -av --delete utils/ child-repo/utils/

          cp index.js child-repo/index.js
          cp package.json child-repo/package.json
          cp README.md child-repo/README.md
          cp .gitignore child-repo/.gitignore

          if [ -f package-lock.json ]; then
            cp package-lock.json child-repo/package-lock.json
          fi

          if [ -f .env.example ]; then
            cp .env.example child-repo/.env.example
          fi

      - name: Commit changes
        id: commit
        run: |
          cd child-repo

          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes found for ${{ matrix.child_repo }}"
          else
            git add .
            git commit -m "Sync main-bot ${{ inputs.release_name }}"
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push sync branch
        if: steps.commit.outputs.changed == 'true'
        run: |
          cd child-repo
          git push origin sync/${{ inputs.release_name }}-${{ github.run_number }}

      - name: Create pull request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.BOT_SYNC_TOKEN }}
        run: |
          cd child-repo
          gh pr create \
            --repo ${{ matrix.child_repo }} \
            --base main \
            --head sync/${{ inputs.release_name }}-${{ github.run_number }} \
            --title "Sync main-bot ${{ inputs.release_name }}" \
            --body "This PR syncs shared bot code from jonathanpersonal/main-bot.

          Source repo: jonathanpersonal/main-bot
          Release/sync name: ${{ inputs.release_name }}
          Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Review before merging, especially if this child bot has custom files."
